apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-search-deployment
  namespace: meeting-system
  labels:
    app: text-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text-search
  template:
    metadata:
      labels:
        app: text-search
    spec:
      containers:
        - name: text-search
          image: gk123a/search-text-service:latest
          imagePullPolicy: Always # Để Always để dễ test bản build mới
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: text-search-config
            - secretRef:
                name: text-search-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi # Nâng lên 2Gi để load mô hình NLP an toàn
---
apiVersion: v1
kind: Service
metadata:
  name: text-search-svc
  namespace: meeting-system
spec:
  selector:
    app: text-search
  ports:
    - protocol: TCP
      port: 8006
      targetPort: 8006
  type: ClusterIP

---
# [BỔ SUNG] Ingress để Frontend gọi được qua domain text-meeting.co
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: text-search-ingress
  namespace: meeting-system
spec:
  ingressClassName: haproxy
  rules:
    - host: text-meeting.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: text-search-svc
                port:
                  number: 8006